<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>المتجر</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --accent:#d4af37;--accent-2:#f0d060;--accent-rgb:212,175,55;
  --radius:18px;--shadow:0 20px 50px rgba(var(--accent-rgb),.12);
}
body[data-theme="gold"]{--accent:#d4af37;--accent-2:#f0d060;--accent-rgb:212,175,55}
body[data-theme="emerald"]{--accent:#1f8b4d;--accent-2:#45d483;--accent-rgb:31,139,77}
body[data-theme="ocean"]{--accent:#00a7d1;--accent-2:#7be3f8;--accent-rgb:0,167,209}
body[data-theme="rose"]{--accent:#c4476b;--accent-2:#f08fa9;--accent-rgb:196,71,107}
body[data-theme="slate"]{--accent:#465d7c;--accent-2:#7f9bc0;--accent-rgb:70,93,124}
body[data-mode="dark"]{
  --bg:#0b0d12;--bg-soft:#11151d;--surface:#151a24;--surface-2:#1b2230;
  --text:#f7f4ef;--text-soft:#b3bac8;--border:rgba(255,255,255,.08);
  --glass:rgba(255,255,255,.04);--hero-overlay:linear-gradient(180deg,rgba(11,13,18,.28),rgba(11,13,18,.68));
}
body[data-mode="light"]{
  --bg:#f5f7fb;--bg-soft:#eef2f8;--surface:#ffffff;--surface-2:#f9fbff;
  --text:#1c2430;--text-soft:#69768b;--border:rgba(28,36,48,.10);
  --glass:rgba(255,255,255,.72);--hero-overlay:linear-gradient(180deg,rgba(255,255,255,.15),rgba(28,36,48,.30));
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s}
a{text-decoration:none;color:inherit}
button,input,textarea,select{font:inherit}
img{max-width:100%;display:block}

nav{
  position:sticky;top:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 5%;
  background:color-mix(in srgb, var(--bg) 84%, transparent);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
}
.nav-logo{
  font-size:1.35rem;font-weight:900;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-links{display:flex;gap:22px;list-style:none;color:var(--text-soft);font-weight:700;font-size:.92rem}
.nav-links a:hover{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:10px}
.lang-btn,.icon-btn{
  border:1px solid var(--border);background:var(--glass);color:var(--text);
  border-radius:999px;min-height:42px;padding:0 14px;cursor:pointer;transition:.2s ease;
}
.lang-btn:hover,.icon-btn:hover{border-color:rgba(var(--accent-rgb),.45);transform:translateY(-1px)}
.icon-btn{width:42px;padding:0;display:grid;place-items:center;position:relative}
.icon-btn svg{width:20px;height:20px;stroke:currentColor;fill:none}
.cart-count{
  position:absolute;top:-4px;inset-inline-end:-4px;
  width:18px;height:18px;border-radius:50%;display:grid;place-items:center;
  font-size:.65rem;font-weight:900;background:var(--accent);color:#111;
}

.hero{
  position:relative;min-height:520px;overflow:hidden;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(var(--accent-rgb),.16),transparent 55%),var(--bg-soft);
}
.hero-slider,.hero-track,.hero-slide{position:absolute;inset:0}
.hero-track{display:flex;transition:transform .6s ease}
.hero-slide{min-width:100%;background-size:cover;background-position:center;position:relative}
.hero-slide::after{content:'';position:absolute;inset:0;background:var(--hero-overlay)}
.hero-fallback{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(var(--accent-rgb),.18),transparent 30%),
    radial-gradient(circle at 80% 10%,rgba(var(--accent-rgb),.12),transparent 24%),
    radial-gradient(circle at 50% 80%,rgba(var(--accent-rgb),.10),transparent 26%);
}
.hero-content{
  position:relative;z-index:2;max-width:1120px;margin:0 auto;
  min-height:520px;padding:70px 5%;display:flex;align-items:center;
}
.hero-copy{max-width:680px}
.hero-copy h1{font-size:clamp(2rem,5vw,3.9rem);line-height:1.15;font-weight:900;margin-bottom:16px}
.hero-copy h1 span{color:var(--accent)}
.hero-copy p{font-size:1.05rem;line-height:1.9;color:var(--text-soft);max-width:560px}
.hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}
.hero-btn,.hero-btn-secondary{
  border:none;border-radius:999px;padding:14px 28px;font-weight:800;cursor:pointer;transition:.2s ease;
}
.hero-btn{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#111;box-shadow:var(--shadow)}
.hero-btn-secondary{background:var(--glass);color:var(--text);border:1px solid var(--border)}
.hero-btn:hover,.hero-btn-secondary:hover{transform:translateY(-2px)}
.hero-badges{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.hero-badge{
  padding:8px 14px;border-radius:999px;background:var(--glass);border:1px solid var(--border);
  color:var(--text-soft);font-size:.84rem;font-weight:700;
}
.hero-nav{
  position:absolute;bottom:18px;inset-inline:0;z-index:3;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.hero-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.35);border:none;cursor:pointer}
.hero-dot.active{width:28px;border-radius:999px;background:var(--accent)}
.hero-arrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:3;
  width:46px;height:46px;border-radius:50%;border:1px solid var(--border);
  background:color-mix(in srgb,var(--bg) 72%,transparent);color:var(--text);
  display:grid;place-items:center;cursor:pointer;
}
.hero-arrow.prev{inset-inline-start:24px}
.hero-arrow.next{inset-inline-end:24px}
.hero-arrow svg{width:20px;height:20px;stroke:currentColor;fill:none}

.wrap{max-width:1200px;margin:0 auto;padding:0 5%}
.search-row{padding:28px 0 8px}
.search-box{position:relative}
.search-box input{
  width:100%;height:56px;padding:0 56px 0 18px;border-radius:18px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);outline:none;
}
.search-box svg{position:absolute;top:50%;transform:translateY(-50%);inset-inline-end:18px;width:22px;height:22px;stroke:var(--text-soft);fill:none}
.cats{display:flex;flex-wrap:wrap;gap:10px;padding:16px 0 8px}
.cat-btn{
  border:1px solid var(--border);background:var(--surface);color:var(--text-soft);
  border-radius:999px;padding:9px 18px;font-weight:700;cursor:pointer;transition:.2s ease;
}
.cat-btn:hover,.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#111}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 0 18px}
.section-title{font-size:1.45rem;font-weight:900}
.section-meta{color:var(--text-soft);font-size:.92rem}
.products-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;padding-bottom:54px;
}
.product-card{
  background:var(--surface);border:1px solid var(--border);border-radius:24px;overflow:hidden;
  transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease;cursor:pointer;
}
.product-card:hover{transform:translateY(-6px);border-color:rgba(var(--accent-rgb),.26);box-shadow:var(--shadow)}
.product-figure{position:relative;aspect-ratio:1/1;background:var(--surface-2);overflow:hidden}
.product-figure img,.product-placeholder{width:100%;height:100%;object-fit:cover}
.product-placeholder{display:grid;place-items:center;color:var(--text-soft)}
.product-placeholder svg{width:38px;height:38px;stroke:currentColor;fill:none}
.product-badges{position:absolute;top:12px;inset-inline:12px;display:flex;flex-wrap:wrap;gap:8px}
.badge{padding:6px 10px;border-radius:999px;font-size:.74rem;font-weight:800}
.badge-discount{background:var(--accent);color:#111}
.badge-cat{background:rgba(0,0,0,.35);color:#fff;backdrop-filter:blur(8px)}
.product-body{padding:18px}
.product-name{font-size:1.02rem;font-weight:900;margin-bottom:8px}
.product-desc{font-size:.9rem;color:var(--text-soft);line-height:1.8;min-height:50px}
.price-row{display:flex;align-items:end;gap:10px;flex-wrap:wrap;margin-top:14px}
.price{font-size:1.2rem;font-weight:900;color:var(--accent)}
.old-price{text-decoration:line-through;color:var(--text-soft);font-size:.9rem}
.product-actions{display:flex;gap:10px;margin-top:16px}
.primary-btn,.ghost-btn{
  flex:1;min-height:44px;border-radius:14px;border:none;cursor:pointer;font-weight:800;transition:.2s ease;
}
.primary-btn{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#111}
.ghost-btn{background:var(--bg-soft);border:1px solid var(--border);color:var(--text)}
.primary-btn:hover,.ghost-btn:hover{transform:translateY(-1px)}
.empty-state{
  padding:54px 18px;border:1px dashed var(--border);background:var(--surface);border-radius:24px;
  text-align:center;color:var(--text-soft);
}
.empty-state svg{width:54px;height:54px;stroke:currentColor;fill:none;margin:0 auto 10px}

.modal-overlay,.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:.25s ease;z-index:2000;
}
.modal-overlay.open,.drawer-overlay.open{opacity:1;pointer-events:auto}
.modal{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);
  width:min(960px,calc(100vw - 24px));max-height:90vh;overflow:auto;
  background:var(--surface);border:1px solid var(--border);border-radius:26px;transition:.25s ease;
}
.modal-overlay.open .modal{transform:translate(-50%,-50%) scale(1)}
.modal-close,.drawer-close{
  position:absolute;top:14px;inset-inline-end:14px;width:40px;height:40px;border-radius:50%;
  border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;z-index:3;
}
.product-modal{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr)}
.modal-gallery{padding:18px;background:var(--bg-soft);position:relative}
.modal-main-image{aspect-ratio:1/1;border-radius:22px;overflow:hidden;background:var(--surface-2)}
.modal-main-image img,.modal-main-image .product-placeholder{width:100%;height:100%;object-fit:cover}
.modal-thumbs{display:flex;gap:10px;overflow:auto;padding-top:12px}
.modal-thumb{width:82px;height:82px;border-radius:16px;border:2px solid transparent;overflow:hidden;cursor:pointer;flex:none;background:var(--surface)}
.modal-thumb.active{border-color:var(--accent)}
.modal-thumb img{width:100%;height:100%;object-fit:cover}
.modal-body{padding:26px}
.modal-body .badge-cat{background:rgba(var(--accent-rgb),.10);color:var(--accent);border:1px solid rgba(var(--accent-rgb),.18)}
.modal-title{font-size:1.65rem;font-weight:900;margin:12px 0 8px}
.modal-desc{color:var(--text-soft);line-height:1.95}
.modal-price-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:18px 0}
.modal-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}

.cart-drawer{
  position:fixed;top:0;inset-inline-end:-430px;width:min(430px,100vw);height:100vh;
  background:var(--surface);border-inline-start:1px solid var(--border);z-index:2100;transition:.28s ease;
  display:flex;flex-direction:column;
}
.cart-drawer.open{inset-inline-end:0}
.cart-head{padding:22px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-head h3{font-size:1.1rem;font-weight:900}
.cart-items{padding:16px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:12px}
.cart-item{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:18px;background:var(--bg-soft)}
.cart-item img,.cart-item-fallback{width:82px;height:82px;border-radius:14px;object-fit:cover;background:var(--surface-2)}
.cart-item-fallback{display:grid;place-items:center;color:var(--text-soft)}
.cart-item-info{flex:1}
.cart-item-name{font-weight:800;margin-bottom:4px}
.cart-item-price{color:var(--accent);font-weight:900;margin-bottom:8px}
.qty-row{display:flex;align-items:center;gap:8px}
.qty-btn,.remove-btn{min-width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.remove-btn{padding:0 12px;font-size:.85rem}
.cart-foot{padding:18px;border-top:1px solid var(--border);background:var(--surface)}
.cart-total{display:flex;justify-content:space-between;align-items:center;font-size:1rem;font-weight:800;margin-bottom:12px}
.wa-btn{
  width:100%;min-height:48px;border:none;border-radius:16px;cursor:pointer;font-weight:900;
  background:#25D366;color:#082c17;display:flex;align-items:center;justify-content:center;gap:10px;
}
.wa-btn svg{width:18px;height:18px;fill:currentColor}

.toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(90px);z-index:3000;
  padding:12px 22px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#111;font-weight:900;opacity:0;transition:.25s ease;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

footer{border-top:1px solid var(--border);padding:30px 5% 40px;color:var(--text-soft);text-align:center;background:var(--bg-soft)}
footer span{color:var(--accent);font-weight:800}

@media(max-width:900px){
  .product-modal{grid-template-columns:1fr}
  .hero-content{padding:54px 5% 72px;align-items:flex-end}
}
@media(max-width:720px){
  nav{padding:12px 4%}
  .nav-links{display:none}
  .hero{min-height:460px}
  .hero-content{min-height:460px;padding:48px 4% 74px}
  .hero-copy p{font-size:.96rem}
  .hero-arrow{display:none}
  .wrap{padding:0 4%}
  .products-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .product-body{padding:14px}
  .product-name{font-size:.95rem}
  .product-desc{font-size:.82rem;min-height:44px}
  .section-head{align-items:flex-start;flex-direction:column}
}
@media(max-width:480px){
  .products-grid{grid-template-columns:1fr 1fr}
  .hero-actions{flex-direction:column;align-items:stretch}
  .hero-btn,.hero-btn-secondary{width:100%}
  .modal{width:min(100vw - 12px,960px)}
}
</style>
</head>
<body data-theme="gold" data-mode="dark">
<nav>
  <div class="nav-logo" id="storeName">STORE</div>
  <ul class="nav-links">
    <li><a href="#hero" data-ar="الرئيسية" data-en="Home">الرئيسية</a></li>
    <li><a href="#productsSection" data-ar="المنتجات" data-en="Products">المنتجات</a></li>
    <li><a href="#contact" data-ar="تواصل" data-en="Contact">تواصل</a></li>
  </ul>
  <div class="nav-right">
    <button class="lang-btn" id="langBtn">EN</button>
    <button class="icon-btn" id="cartOpenBtn" aria-label="cart">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M6 2l-3 4v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-slider">
    <div class="hero-fallback" id="heroFallback"></div>
    <div class="hero-track" id="heroTrack"></div>
  </div>
  <button class="hero-arrow prev" id="heroPrev" type="button" aria-label="prev">
    <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>
  <button class="hero-arrow next" id="heroNext" type="button" aria-label="next">
    <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>
  <div class="hero-content">
    <div class="hero-copy">
      <h1 id="heroTitle"><span>اكتشف</span> أفضل المنتجات</h1>
      <p id="heroSubtitle">تسوق بذوق رفيع من مجموعتنا المختارة بعناية.</p>
      <div class="hero-actions">
        <button class="hero-btn" id="heroPrimaryBtn" type="button" onclick="scrollToProducts()">تسوق الآن</button>
        <button class="hero-btn-secondary" type="button" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})" data-ar="تواصل واتساب" data-en="WhatsApp Contact">تواصل واتساب</button>
      </div>
      <div class="hero-badges">
        <span class="hero-badge" data-ar="شحن سريع" data-en="Fast shipping">شحن سريع</span>
        <span class="hero-badge" data-ar="جودة مضمونة" data-en="Quality guaranteed">جودة مضمونة</span>
        <span class="hero-badge" data-ar="دعم فوري" data-en="Instant support">دعم فوري</span>
      </div>
    </div>
  </div>
  <div class="hero-nav" id="heroDots"></div>
</section>

<main class="wrap" id="productsSection">
  <div class="search-row">
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="ابحث عن منتج..." data-ar-placeholder="ابحث عن منتج..." data-en-placeholder="Search for a product..." />
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-3.5-3.5"></path></svg>
    </div>
  </div>
  <div class="cats" id="catsContainer"></div>
  <div class="section-head">
    <div>
      <div class="section-title" data-ar="المنتجات المميزة" data-en="Featured products">المنتجات المميزة</div>
      <div class="section-meta" id="productsMeta"></div>
    </div>
  </div>
  <div class="products-grid" id="productsGrid">
    <div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" stroke-width="1.6"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
      <p>جاري تحميل المنتجات...</p>
    </div>
  </div>
</main>

<div class="modal-overlay" id="productModalOverlay">
  <div class="modal">
    <button class="modal-close" id="productModalClose" type="button">✕</button>
    <div class="product-modal">
      <div class="modal-gallery">
        <div class="modal-main-image" id="modalMainImage"></div>
        <div class="modal-thumbs" id="modalThumbs"></div>
      </div>
      <div class="modal-body">
        <span class="badge badge-cat" id="modalCategory">-</span>
        <div class="modal-title" id="modalTitle">-</div>
        <div class="modal-desc" id="modalDesc">-</div>
        <div class="modal-price-row">
          <span class="price" id="modalPrice">0</span>
          <span class="old-price" id="modalOldPrice"></span>
        </div>
        <div class="modal-actions">
          <button class="primary-btn" id="modalAddBtn" type="button" data-ar="أضف إلى السلة" data-en="Add to cart">أضف إلى السلة</button>
          <button class="ghost-btn" id="modalWhatsAppBtn" type="button" data-ar="اطلب عبر واتساب" data-en="Order by WhatsApp">اطلب عبر واتساب</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <h3 data-ar="سلة التسوق" data-en="Shopping cart">سلة التسوق</h3>
    <button class="drawer-close" id="cartCloseBtn" type="button">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total">
      <span data-ar="المجموع" data-en="Total">المجموع</span>
      <span id="cartTotal">0</span>
    </div>
    <button class="wa-btn" id="cartWhatsAppBtn" type="button">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884"></path></svg>
      <span data-ar="إتمام الطلب عبر واتساب" data-en="Checkout via WhatsApp">إتمام الطلب عبر واتساب</span>
    </button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<footer id="contact">
  <p>© 2026 <span id="footerName">STORE</span> — <span data-ar="جميع الحقوق محفوظة" data-en="All rights reserved">جميع الحقوق محفوظة</span></p>
  <p style="margin-top:8px"><span id="footerContact" data-ar="الطلب والتواصل عبر واتساب" data-en="Orders and contact via WhatsApp">الطلب والتواصل عبر واتساب</span></p>
</footer>

<script>
// ═══════════════════════════════════════════════
//  ضع هنا بياناتك الخاصة
// ═══════════════════════════════════════════════
const SUPABASE_URL  = 'https://pvxgacpgqqdrfiidpmhz.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_Eshtee3MlIfxrVNtAnWIeQ_MMBWe_4e';
// ═══════════════════════════════════════════════

const CART_KEY = 'nj_cart';
const LANG_KEY = 'nj_lang';
const SETTINGS_ID = 1; // الصف الوحيد في جدول store_settings

const DEFAULT_SETTINGS = {
  store_name: 'STORE',
  whatsapp: '212703652247',
  default_currency: 'MAD',
  store_theme: 'gold',
  store_mode: 'dark',
  hero_title_ar: '<span>اكتشف</span> أفضل المنتجات',
  hero_title_en: 'Discover <span>Premium</span> Products',
  hero_subtitle_ar: 'تسوق بذوق رفيع من مجموعتنا المختارة بعناية مع تجربة عرض أسرع وأكثر سلاسة.',
  hero_subtitle_en: 'Shop from our carefully curated collection with a faster and smoother storefront experience.',
  hero_button_ar: 'تسوق الآن',
  hero_button_en: 'Shop now',
  hero_slides: [],
  contact_email: '',
  contact_phone: '',
  footer_text_ar: 'الطلب والتواصل عبر واتساب',
  footer_text_en: 'Orders and contact via WhatsApp'
};

let storeSettings = {...DEFAULT_SETTINGS};
let allProducts    = [];
let currentLang    = localStorage.getItem(LANG_KEY) || 'ar';
let currentCat     = 'all';
let cart           = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
let currentProduct = null;
let currentModalIndex = 0;
let heroIndex = 0;
let heroTimer = null;

// ── Supabase helper ──────────────────────────────
async function sbFetch(path, options = {}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...options.headers
    }
  });
  if(!res.ok) throw new Error(await res.text());
  try{ return await res.json(); } catch{ return null; }
}

// ── Load settings from Supabase ──────────────────
async function loadStoreSettings(){
  try{
    const rows = await sbFetch(`store_settings?id=eq.${SETTINGS_ID}&select=*`);
    if(rows && rows.length){
      const row = rows[0];
      storeSettings = {...DEFAULT_SETTINGS};
      Object.keys(DEFAULT_SETTINGS).forEach(k => {
        if(row[k] !== null && row[k] !== undefined) storeSettings[k] = row[k];
      });
      // heroSlides stored as JSON array or JSONB
      if(typeof storeSettings.hero_slides === 'string'){
        try{ storeSettings.hero_slides = JSON.parse(storeSettings.hero_slides); }
        catch{ storeSettings.hero_slides = []; }
      }
      if(!Array.isArray(storeSettings.hero_slides)) storeSettings.hero_slides = [];
    }
  }catch(e){
    // silently fall back to defaults
    console.warn('Settings load failed, using defaults', e);
  }
  applyStoreSettings();
}

function applyStoreSettings(){
  document.body.dataset.theme = storeSettings.store_theme || 'gold';
  document.body.dataset.mode  = storeSettings.store_mode  || 'dark';
  // Name
  const name = storeSettings.store_name || 'STORE';
  document.getElementById('storeName').textContent   = name;
  document.getElementById('footerName').textContent  = name;
  document.title = name;
  // Footer
  const fc = document.getElementById('footerContact');
  if(fc){
    fc.dataset.ar = storeSettings.footer_text_ar || DEFAULT_SETTINGS.footer_text_ar;
    fc.dataset.en = storeSettings.footer_text_en || DEFAULT_SETTINGS.footer_text_en;
    fc.textContent = currentLang === 'ar' ? fc.dataset.ar : fc.dataset.en;
  }
  renderHero();
}

// ── Hero slider ──────────────────────────────────
function renderHero(){
  const title    = currentLang === 'ar' ? storeSettings.hero_title_ar    : storeSettings.hero_title_en;
  const subtitle = currentLang === 'ar' ? storeSettings.hero_subtitle_ar : storeSettings.hero_subtitle_en;
  const button   = currentLang === 'ar' ? storeSettings.hero_button_ar   : storeSettings.hero_button_en;

  document.getElementById('heroTitle').innerHTML     = title || '';
  document.getElementById('heroSubtitle').textContent = subtitle || '';
  document.getElementById('heroPrimaryBtn').textContent = button || '';

  const slides = Array.isArray(storeSettings.hero_slides) ? storeSettings.hero_slides.filter(Boolean) : [];
  const track   = document.getElementById('heroTrack');
  const dots    = document.getElementById('heroDots');
  const fallback = document.getElementById('heroFallback');

  if(!slides.length){
    track.innerHTML = '';
    dots.innerHTML  = '';
    fallback.style.display = 'block';
    document.getElementById('heroPrev').style.display = 'none';
    document.getElementById('heroNext').style.display = 'none';
    stopHeroAuto();
    return;
  }

  fallback.style.display = 'none';
  document.getElementById('heroPrev').style.display = slides.length > 1 ? 'grid' : 'none';
  document.getElementById('heroNext').style.display = slides.length > 1 ? 'grid' : 'none';
  if(heroIndex >= slides.length) heroIndex = 0;

  track.innerHTML = slides.map(url =>
    `<div class="hero-slide" style="background-image:url('${url.replace(/'/g,"&apos;")}')"></div>`
  ).join('');

  dots.innerHTML = slides.map((_,i) =>
    `<button class="hero-dot ${i===heroIndex?'active':''}" type="button" onclick="goHero(${i})"></button>`
  ).join('');

  const dir = document.documentElement.dir;
  track.style.transform = dir === 'rtl'
    ? `translateX(${heroIndex * 100}%)`
    : `translateX(-${heroIndex * 100}%)`;

  startHeroAuto();
}
function goHero(index){
  const slides = Array.isArray(storeSettings.hero_slides) ? storeSettings.hero_slides.filter(Boolean) : [];
  if(!slides.length) return;
  heroIndex = (index + slides.length) % slides.length;
  renderHero();
}
function nextHero(){ goHero(heroIndex + 1); }
function prevHero(){ goHero(heroIndex - 1); }
function startHeroAuto(){
  stopHeroAuto();
  const slides = Array.isArray(storeSettings.hero_slides) ? storeSettings.hero_slides.filter(Boolean) : [];
  if(slides.length <= 1) return;
  heroTimer = setInterval(()=>goHero(heroIndex + 1), 4500);
}
function stopHeroAuto(){
  if(heroTimer){ clearInterval(heroTimer); heroTimer = null; }
}

// ── Products ─────────────────────────────────────
async function loadProducts(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=created_at.desc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    if(!res.ok) throw new Error('load_failed');
    allProducts = await res.json();
    renderCategories();
    renderProducts(document.getElementById('searchInput').value.trim().toLowerCase());
  }catch(e){
    document.getElementById('productsGrid').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">
        <svg viewBox="0 0 24 24" stroke-width="1.6"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>
        <p>${currentLang==='ar'?'تعذر تحميل المنتجات':'Could not load products'}</p>
      </div>`;
  }
}

function getProductImages(product){
  if(Array.isArray(product.images) && product.images.length) return product.images.filter(Boolean);
  if(product.image_url) return [product.image_url];
  return [];
}

function currencyOf(product){
  return product.currency || storeSettings.default_currency || 'MAD';
}

function shortText(text, max=85){
  if(!text) return '';
  return text.length > max ? text.slice(0, max - 1) + '…' : text;
}

function renderCategories(){
  const cats = [...new Set(allProducts.map(p=>p.category).filter(Boolean))];
  const label_all_ar = 'الكل';
  const label_all_en = 'All';
  const container = document.getElementById('catsContainer');
  container.innerHTML = `<button class="cat-btn ${currentCat==='all'?'active':''}" type="button" data-cat="all" data-ar="${label_all_ar}" data-en="${label_all_en}">${currentLang==='ar'?label_all_ar:label_all_en}</button>`
    + cats.map(c=>`<button class="cat-btn ${currentCat===c?'active':''}" type="button" data-cat="${escapeAttr(c)}">${escapeAttr(c)}</button>`).join('');
  container.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', ()=>{
      currentCat = btn.dataset.cat;
      container.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b===btn));
      renderProducts(document.getElementById('searchInput').value.trim().toLowerCase());
    });
  });
}

function renderProducts(query=''){
  let list = currentCat === 'all' ? allProducts : allProducts.filter(p=>p.category===currentCat);
  if(query) list = list.filter(p => [p.name,p.name_en,p.description,p.description_en,p.category].some(v=>(v||'').toLowerCase().includes(query)));
  const meta = document.getElementById('productsMeta');
  meta.textContent = currentLang==='ar' ? `${list.length} منتج` : `${list.length} product${list.length!==1?'s':''}`;
  const grid = document.getElementById('productsGrid');
  if(!list.length){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" stroke-width="1.6"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path></svg>
      <p>${currentLang==='ar'?'لا توجد منتجات':'No products found'}</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(product => {
    const images = getProductImages(product);
    const name   = currentLang==='ar' ? (product.name||'') : (product.name_en||product.name||'');
    const desc   = currentLang==='ar' ? shortText(product.description) : shortText(product.description_en||product.description);
    const disc   = product.old_price ? Math.round((1 - product.price/product.old_price)*100) : 0;
    return `
      <div class="product-card" onclick="openProductModal('${product.id}')">
        <div class="product-figure">
          ${images[0]
            ? `<img src="${images[0]}" alt="${escapeAttr(name)}" loading="lazy" />`
            : `<div class="product-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg></div>`}
          <div class="product-badges">
            ${disc>0 ? `<span class="badge badge-discount">-${disc}%</span>` : ''}
            ${product.category ? `<span class="badge badge-cat">${escapeAttr(product.category)}</span>` : ''}
          </div>
        </div>
        <div class="product-body">
          <div class="product-name">${name}</div>
          <div class="product-desc">${desc}</div>
          <div class="price-row">
            <span class="price">${Number(product.price||0).toFixed(2)} ${currencyOf(product)}</span>
            ${product.old_price ? `<span class="old-price">${Number(product.old_price).toFixed(2)}</span>` : ''}
          </div>
          <div class="product-actions">
            <button class="primary-btn" type="button" onclick="event.stopPropagation();addToCart(${JSON.stringify(product).replace(/"/g,'&quot;')})" data-ar="سلة" data-en="Cart">${currentLang==='ar'?'سلة':'Cart'}</button>
            <button class="ghost-btn" type="button" onclick="event.stopPropagation();openProductModal('${product.id}')" data-ar="تفاصيل" data-en="Details">${currentLang==='ar'?'تفاصيل':'Details'}</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Product Modal ────────────────────────────────
function openProductModal(id){
  currentProduct = allProducts.find(p=>p.id===id||p.id===Number(id));
  if(!currentProduct) return;
  currentModalIndex = 0;
  const images = getProductImages(currentProduct);
  const name   = currentLang==='ar' ? (currentProduct.name||'') : (currentProduct.name_en||currentProduct.name||'');
  const desc   = currentLang==='ar' ? (currentProduct.description||'') : (currentProduct.description_en||currentProduct.description||'');

  document.getElementById('modalCategory').textContent = currentProduct.category || '';
  document.getElementById('modalTitle').textContent    = name;
  document.getElementById('modalDesc').textContent     = desc;
  document.getElementById('modalPrice').textContent    = `${Number(currentProduct.price||0).toFixed(2)} ${currencyOf(currentProduct)}`;
  const op = document.getElementById('modalOldPrice');
  op.textContent = currentProduct.old_price ? `${Number(currentProduct.old_price).toFixed(2)}` : '';

  renderModalImages(images, name);
  document.getElementById('productModalOverlay').classList.add('open');
}

function renderModalImages(images, altText=''){
  const main   = document.getElementById('modalMainImage');
  const thumbs = document.getElementById('modalThumbs');
  if(!images.length){
    main.innerHTML = `<div class="product-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg></div>`;
    thumbs.innerHTML = '';
    return;
  }
  main.innerHTML = `<img src="${images[currentModalIndex]}" alt="${escapeAttr(altText)}" />`;
  thumbs.innerHTML = images.map((img,i) =>
    `<button class="modal-thumb ${i===currentModalIndex?'active':''}" type="button" onclick="setModalImage(${i})"><img src="${img}" alt="thumb ${i+1}" /></button>`
  ).join('');
}

function setModalImage(index){
  if(!currentProduct) return;
  currentModalIndex = index;
  const images = getProductImages(currentProduct);
  const name   = currentLang==='ar' ? (currentProduct.name||'') : (currentProduct.name_en||currentProduct.name||'');
  renderModalImages(images, name);
}
function closeProductModal(){
  document.getElementById('productModalOverlay').classList.remove('open');
}

// ── Cart ─────────────────────────────────────────
function addToCart(product){
  const found = cart.find(item=>item.id===product.id);
  if(found) found.qty += 1;
  else cart.push({...product, qty:1});
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartUI();
  toast(currentLang==='ar' ? 'تمت إضافة المنتج إلى السلة' : 'Product added to cart');
}
function changeQty(id, delta){
  const item = cart.find(e=>e.id===id||e.id===Number(id));
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(e=>e.id!==id && e.id!==Number(id));
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartUI();
}
function removeFromCart(id){
  cart = cart.filter(item=>item.id!==id && item.id!==Number(id));
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartUI();
}
function updateCartUI(){
  const count = cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent = count;
  const total = cart.reduce((s,i)=>s+(Number(i.price||0)*i.qty),0);
  const curr  = cart[0] ? currencyOf(cart[0]) : (storeSettings.default_currency||'MAD');
  document.getElementById('cartTotal').textContent = `${total.toFixed(2)} ${curr}`;
  const container = document.getElementById('cartItems');
  if(!cart.length){
    container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" stroke-width="1.6"><path d="M6 2l-3 4v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path></svg><p>${currentLang==='ar'?'السلة فارغة حالياً':'Your cart is currently empty'}</p></div>`;
    return;
  }
  container.innerHTML = cart.map(item=>{
    const images = getProductImages(item);
    const name   = currentLang==='ar' ? (item.name||'') : (item.name_en||item.name||'');
    return `
      <div class="cart-item">
        ${images[0]
          ? `<img src="${images[0]}" alt="${escapeAttr(name)}" />`
          : `<div class="cart-item-fallback"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg></div>`}
        <div class="cart-item-info">
          <div class="cart-item-name">${name}</div>
          <div class="cart-item-price">${(Number(item.price||0)*item.qty).toFixed(2)} ${currencyOf(item)}</div>
          <div class="qty-row">
            <button class="qty-btn" type="button" onclick="changeQty('${item.id}',-1)">−</button>
            <strong>${item.qty}</strong>
            <button class="qty-btn" type="button" onclick="changeQty('${item.id}',1)">+</button>
            <button class="remove-btn" type="button" onclick="removeFromCart('${item.id}')">${currentLang==='ar'?'حذف':'Remove'}</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── WhatsApp ─────────────────────────────────────
function buildWhatsAppMessage(singleProduct=null){
  const number = (storeSettings.whatsapp||'').replace(/\D/g,'');
  if(!number) return null;
  if(singleProduct){
    const name = currentLang==='ar' ? (singleProduct.name||'') : (singleProduct.name_en||singleProduct.name||'');
    const msg  = encodeURIComponent(`${currentLang==='ar'?'مرحبا، أريد طلب هذا المنتج:':'Hello, I want to order this product:'}\n- ${name}\n${currentLang==='ar'?'السعر:':'Price:'} ${Number(singleProduct.price||0).toFixed(2)} ${currencyOf(singleProduct)}`);
    return `https://wa.me/${number}?text=${msg}`;
  }
  if(!cart.length) return null;
  const lines = cart.map(item=>`- ${(currentLang==='ar'?(item.name||''):(item.name_en||item.name||''))} x${item.qty} = ${(Number(item.price||0)*item.qty).toFixed(2)} ${currencyOf(item)}`).join('\n');
  const total = cart.reduce((s,i)=>s+(Number(i.price||0)*i.qty),0).toFixed(2);
  const msg   = encodeURIComponent(`${currentLang==='ar'?'طلب جديد:':'New order:'}\n${lines}\n${currentLang==='ar'?'المجموع:':'Total:'} ${total} ${cart[0]?currencyOf(cart[0]):storeSettings.default_currency}`);
  return `https://wa.me/${number}?text=${msg}`;
}

// ── Lang ──────────────────────────────────────────
function applyLang(){
  document.documentElement.lang = currentLang;
  document.documentElement.dir  = currentLang==='ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-ar]').forEach(el=>{
    const val = currentLang==='ar' ? el.dataset.ar : el.dataset.en;
    if(val) el.innerHTML = val;
  });
  document.querySelectorAll('[data-ar-placeholder]').forEach(el=>{
    el.placeholder = currentLang==='ar' ? el.dataset.arPlaceholder : el.dataset.enPlaceholder;
  });
  document.getElementById('langBtn').textContent = currentLang==='ar' ? 'EN' : 'ع';
  applyStoreSettings();
  renderCategories();
  renderProducts(document.getElementById('searchInput').value.trim().toLowerCase());
  updateCartUI();
}

function scrollToProducts(){
  document.getElementById('productsSection').scrollIntoView({behavior:'smooth'});
}
function escapeAttr(value=''){
  return String(value).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(message){
  const el = document.getElementById('toast');
  el.textContent = message;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'),2200);
}

// ── Global window exports ─────────────────────────
window.setModalImage = setModalImage;
window.changeQty     = changeQty;
window.removeFromCart= removeFromCart;
window.goHero        = goHero;
window.scrollToProducts = scrollToProducts;

// ── Events ────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e=>renderProducts(e.target.value.trim().toLowerCase()));
document.getElementById('langBtn').addEventListener('click', ()=>{
  currentLang = currentLang==='ar' ? 'en' : 'ar';
  localStorage.setItem(LANG_KEY, currentLang);
  applyLang();
});
document.getElementById('productModalClose').addEventListener('click', closeProductModal);
document.getElementById('productModalOverlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeProductModal(); });
document.getElementById('modalAddBtn').addEventListener('click', ()=>{ if(currentProduct) addToCart(currentProduct); });
document.getElementById('modalWhatsAppBtn').addEventListener('click', ()=>{
  if(!currentProduct) return;
  const url = buildWhatsAppMessage(currentProduct);
  if(url) window.open(url,'_blank');
  else toast(currentLang==='ar'?'أضف رقم واتساب من لوحة التحكم':'Add a WhatsApp number from admin panel');
});
document.getElementById('cartOpenBtn').addEventListener('click', ()=>{ document.getElementById('cartDrawer').classList.add('open'); document.getElementById('cartOverlay').classList.add('open'); });
document.getElementById('cartCloseBtn').addEventListener('click', ()=>{ document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('open'); });
document.getElementById('cartOverlay').addEventListener('click', ()=>{ document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('open'); });
document.getElementById('cartWhatsAppBtn').addEventListener('click', ()=>{
  const url = buildWhatsAppMessage();
  if(!url){ toast(currentLang==='ar'?'السلة فارغة أو رقم واتساب غير متوفر':'Cart is empty or WhatsApp number is missing'); return; }
  window.open(url,'_blank');
});
document.getElementById('heroNext').addEventListener('click', nextHero);
document.getElementById('heroPrev').addEventListener('click', prevHero);
